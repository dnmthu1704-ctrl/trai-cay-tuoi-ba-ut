<svg viewBox="0 0 480 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde6b8"/>
    </linearGradient>
  </defs>
  <rect width="480" height="320" rx="24" fill="url(#bg3)"/>

  <!-- desk -->
  <rect x="0" y="250" width="480" height="70" fill="#e8d4a0"/>

  <!-- laptop -->
  <g transform="translate(60,180)">
    <rect x="0" y="0" width="140" height="90" rx="8" fill="#a78bda"/>
    <rect x="8" y="8" width="124" height="74" rx="4" fill="#f3eefc"/>
    <rect x="-10" y="90" width="160" height="10" rx="4" fill="#7c5cbf"/>
  </g>

  <!-- box 1 -->
  <g transform="translate(250,150)">
    <rect x="0" y="40" width="100" height="80" rx="14" fill="#ffffff" stroke="#f0c987" stroke-width="3"/>
    <rect x="0" y="40" width="100" height="22" rx="14" fill="#ffb648"/>
    <circle cx="30" cy="100" r="16" fill="#ff6b81"/>
    <circle cx="65" cy="95" r="14" fill="#a3d977"/>
    <circle cx="50" cy="115" r="10" fill="#ffd28a"/>
  </g>

  <!-- box 2 stacked -->
  <g transform="translate(340,120)">
    <rect x="0" y="40" width="90" height="70" rx="14" fill="#ffffff" stroke="#f0c987" stroke-width="3"/>
    <rect x="0" y="40" width="90" height="20" rx="14" fill="#3fa86b"/>
    <circle cx="28" cy="95" r="13" fill="#ffb648"/>
    <circle cx="58" cy="90" r="12" fill="#ff5c7a"/>
  </g>

  <!-- coffee cup -->
  <g transform="translate(200,210)">
    <rect x="0" y="0" width="36" height="44" rx="6" fill="#ffffff" stroke="#d8c4f0" stroke-width="3"/>
    <path d="M36 8 q14 0 14 14 q0 14 -14 14" fill="none" stroke="#d8c4f0" stroke-width="4"/>
  </g>
</svg>
