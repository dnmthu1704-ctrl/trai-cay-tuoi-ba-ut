<svg viewBox="0 0 520 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3eefc"/>
      <stop offset="100%" stop-color="#e3d6fb"/>
    </linearGradient>
  </defs>
  <rect width="520" height="420" rx="24" fill="url(#bg1)"/>

  <!-- box -->
  <rect x="90" y="220" width="340" height="150" rx="18" fill="#ffffff" stroke="#c9b6ee" stroke-width="3"/>
  <rect x="90" y="220" width="340" height="40" rx="18" fill="#a78bda"/>
  <text x="260" y="247" text-anchor="middle" font-family="Quicksand, sans-serif" font-size="20" font-weight="700" fill="#ffffff">Bà Út</text>

  <!-- watermelon -->
  <g>
    <path d="M150 300 a55 55 0 0 1 110 0 z" fill="#ff6b81"/>
    <path d="M150 300 a55 55 0 0 1 110 0 z" fill="none" stroke="#3fa86b" stroke-width="10"/>
    <circle cx="190" cy="280" r="3" fill="#3a2e4d"/>
    <circle cx="210" cy="285" r="3" fill="#3a2e4d"/>
    <circle cx="200" cy="295" r="3" fill="#3a2e4d"/>
  </g>

  <!-- orange slice -->
  <g transform="translate(270,265)">
    <circle r="38" fill="#ffb648"/>
    <circle r="32" fill="#ffd28a"/>
    <g stroke="#ffb648" stroke-width="3">
      <line x1="0" y1="-32" x2="0" y2="32"/>
      <line x1="-28" y1="-16" x2="28" y2="16"/>
      <line x1="-28" y1="16" x2="28" y2="-16"/>
    </g>
  </g>

  <!-- kiwi slice -->
  <g transform="translate(350,290)">
    <circle r="30" fill="#a3d977"/>
    <circle r="24" fill="#c4e896"/>
    <circle r="6" fill="#f3eefc"/>
    <g fill="#3a2e4d">
      <circle cx="0" cy="-16" r="1.6"/>
      <circle cx="11" cy="-12" r="1.6"/>
      <circle cx="16" cy="0" r="1.6"/>
      <circle cx="11" cy="12" r="1.6"/>
      <circle cx="0" cy="16" r="1.6"/>
      <circle cx="-11" cy="12" r="1.6"/>
      <circle cx="-16" cy="0" r="1.6"/>
      <circle cx="-11" cy="-12" r="1.6"/>
    </g>
  </g>

  <!-- strawberry -->
  <g transform="translate(395,235)">
    <path d="M-20 0 C-20 30 20 30 20 0 C20 -10 -20 -10 -20 0 Z" fill="#ff5c7a"/>
    <path d="M-12 -8 L0 -22 L12 -8 Z" fill="#3fa86b"/>
    <g fill="#ffe1e6">
      <circle cx="-8" cy="6" r="1.4"/>
      <circle cx="4" cy="4" r="1.4"/>
      <circle cx="-2" cy="14" r="1.4"/>
      <circle cx="10" cy="14" r="1.4"/>
    </g>
  </g>

  <!-- top fruits floating -->
  <g transform="translate(120,90)">
    <circle r="26" fill="#ff9f43"/>
    <ellipse cx="6" cy="-22" rx="6" ry="10" fill="#3fa86b"/>
  </g>
  <g transform="translate(260,60)">
    <circle r="22" fill="#ff5c7a"/>
    <ellipse cx="5" cy="-18" rx="5" ry="8" fill="#3fa86b"/>
  </g>
  <g transform="translate(390,100)">
    <ellipse rx="24" ry="20" fill="#ffe27a"/>
    <ellipse rx="24" ry="20" fill="none" stroke="#ffb648" stroke-width="2"/>
  </g>
</svg>
